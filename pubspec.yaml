name: cardio_flutter
description: A new Flutter project.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Utilidades e Reatividade
  rxdart: ^0.28.0
  get_it: ^9.2.1
  equatable: ^2.0.5
  dartz: ^0.10.1
  http: ^1.2.1
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  cupertino_icons: ^1.0.8

  # Gerenciamento de Estado
  flutter_bloc: ^9.1.1
