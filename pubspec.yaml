  # Firebase (Versões modernas compatíveis com Dart 3)
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  firebase_database: ^12.2.0
  firebase_messaging: ^16.1.3

  # Pacotes que mudaram de nome ou foram atualizados pela comunidade:
  internet_connection_checker_plus: ^2.5.1   # Substitui data_connection_checker
  another_flushbar: ^1.12.30                # Substitui flushbar
  flutter_local_notifications: ^21.0.0
  android_alarm_manager_plus: ^5.0.0        # Substitui android_alarm_manager
  flutter_lints: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/